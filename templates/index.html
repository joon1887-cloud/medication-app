            document.querySelectorAll('.days-chip').forEach(c => c.classList.toggle('active', String(c.dataset.days) === String(v)));
            document.getElementById('daysCustomInput').style.display = v === 'custom' ? 'block' : 'none';
            if (v === 'custom') document.getElementById('daysCustomInput').focus();
        }
        function onDaysCustomInput(v) { formDays = parseInt(v) || 1; }

        function toggleAlarm() {
            formAlarmOn = !formAlarmOn;
            document.getElementById('alarmSwitch').classList.toggle('on', formAlarmOn);
        }

        function openForm() {
            editingId = null;
            document.getElementById('formTitle').textContent = '처방 추가';
            document.getElementById('formTitleMain').textContent = '새 처방 추가';
            document.getElementById('hospital').value = '';
            formDays = 5; formAlarmOn = true;
            setDays(5);
            document.getElementById('alarmSwitch').classList.add('on');
            document.getElementById('drugCardsContainer').innerHTML = '';
            drugCardSeq = 0;
            renderRecentChips();
            goStep1();
            document.getElementById('formOverlay').classList.add('open');
            flatpickr('#visitDate', { locale: 'ko', dateFormat: 'Y-m-d', defaultDate: 'today', disableMobile: true });
            addDrugCard();
        }

        function openEditForm(id) {
            const p = prescriptionsData.find(x => x.id === id);
            if (!p) return;
            const { hospital, visit_date: visitDate, drugs } = p;
            editingId = id;
            document.getElementById('formTitle').textContent = '처방 수정';
            document.getElementById('formTitleMain').textContent = '처방 수정';
            document.getElementById('hospital').value = hospital;
            formDays = (drugs[0] && drugs[0].days) || 5;
            formAlarmOn = drugs.some(d => d.refill_date);
            setDays([3, 5, 7].includes(formDays) ? formDays : 'custom');
            if (![3, 5, 7].includes(formDays)) document.getElementById('daysCustomInput').value = formDays;
            document.getElementById('alarmSwitch').classList.toggle('on', formAlarmOn);
            document.getElementById('drugCardsContainer').innerHTML = '';
            drugCardSeq = 0;
            renderRecentChips();
            goStep1();
            document.getElementById('formOverlay').classList.add('open');
            flatpickr('#visitDate', { locale: 'ko', dateFormat: 'Y-m-d', defaultDate: visitDate, disableMobile: true });
            drugs.forEach(d => addDrugCard(d));
        }

        function closeForm() { document.getElementById('formOverlay').classList.remove('open'); }
        function handleOverlayClick(e) { if (e.target.id === 'formOverlay') closeForm(); }

        function goStep1() {
            document.getElementById('formStep1').style.display = 'block';
            document.getElementById('formStep2').style.display = 'none';
            document.getElementById('stepDot1').classList.add('active');
            document.getElementById('stepLabel1').classList.add('active');
            document.getElementById('stepDot2').classList.remove('active');
            document.getElementById('stepLabel2').classList.remove('active');
        }
        function goStep2() {
            const hospital = document.getElementById('hospital').value.trim();
            if (!hospital) { toast('병원·약국 이름을 입력해주세요'); document.getElementById('hospital').focus(); return; }
            document.getElementById('formStep1').style.display = 'none';
            document.getElementById('formStep2').style.display = 'block';
            document.getElementById('stepDot1').classList.remove('active');
            document.getElementById('stepLabel1').classList.remove('active');
            document.getElementById('stepDot2').classList.add('active');
            document.getElementById('stepLabel2').classList.add('active');
            updateDrugCount();
        }
        function updateDrugCount() {
            const n = document.getElementById('drugCardsContainer').children.length;
            document.getElementById('drugCountLabel').textContent = n + '개';
        }

        const TIME_OPTIONS = ['아침', '점심', '저녁', '취침 전'];
        const METHOD_OPTIONS = ['식전 30분', '식후 30분', '식간', '상관없음'];

        function addDrugCard(drug = null) {
            const id = 'dc' + (drugCardSeq++);
            const container = document.getElementById('drugCardsContainer');
            const wrap = document.createElement('div');
            wrap.className = 'drug-card-input';
            wrap.id = id;

            let dosageNum = 1, dosageUnit = '정';
            if (drug && drug.dosage) {
                const m = drug.dosage.match(/^([\d.]+)(.+)$/);
                if (m) { dosageNum = parseFloat(m[1]); dosageUnit = m[2]; }
            }
            let selectedTimes = [];
            if (drug && drug.times) selectedTimes = drug.times.split('·').map(s => s.trim()).filter(Boolean);
            if (!selectedTimes.length) selectedTimes = ['아침'];
            const meal = (drug && drug.meal_timing) || '식후 30분';

            wrap.dataset.dosageNum = dosageNum;
            wrap.dataset.times = JSON.stringify(selectedTimes);
            wrap.dataset.ingredient = (drug && drug.ingredient) || '';

            wrap.innerHTML = `
                <div class="drug-card-head">
                    <div class="tile"><i class="ti ti-pills"></i></div>
                    <div style="flex:1;min-width:0;">
                        <input type="text" class="drug-name-input" placeholder="약 이름 검색..." value="${drug ? escapeHtml(drug.drug_name) : ''}" oninput="onDrugNameInput('${id}', this)" autocomplete="off">
                        <div class="drug-verified ${drug && drug.ingredient ? '' : 'pending'}" id="${id}-verified">
                            ${drug && drug.ingredient ? `<i class="ti ti-circle-check"></i> 의약품 DB에서 확인됨 · ${escapeHtml(drug.ingredient)}` : (drug ? '성분 정보 없음' : '')}
                        </div>
                        <div class="drug-dropdown" id="${id}-dropdown"></div>
                    </div>
                    <button type="button" class="drug-remove-btn" onclick="removeDrugCard('${id}')"><i class="ti ti-x"></i></button>
                </div>
                <div class="drug-card-body">
                    <div class="drug-card-field-row">
                        <span class="drug-card-field-label">시간</span>
                        <div class="time-toggle-group" id="${id}-times">
                            ${TIME_OPTIONS.map(t => `<button type="button" class="time-toggle ${selectedTimes.includes(t) ? 'active' : ''}" onclick="toggleTimeChip('${id}', '${t}', this)">${t}</button>`).join('')}
                        </div>
                    </div>
                    <div class="drug-card-field-row">
                        <span class="drug-card-field-label">용량</span>
                        <div class="stepper">
                            <button type="button" onclick="stepDose('${id}', -1)"><i class="ti ti-minus"></i></button>
                            <span class="val" id="${id}-doseval">${dosageNum}</span>
                            <button type="button" class="plus" onclick="stepDose('${id}', 1)"><i class="ti ti-plus"></i></button>
                        </div>
                        <select class="unit-select" id="${id}-unit">
                            ${['정','mg','ml','포','캡슐'].map(u => `<option ${u === dosageUnit ? 'selected' : ''}>${u}</option>`).join('')}
                        </select>
                        <select class="method-select" id="${id}-method">
                            ${METHOD_OPTIONS.map(m => `<option ${m === meal ? 'selected' : ''}>${m}</option>`).join('')}
                        </select>
                    </div>
                </div>
            `;
            container.appendChild(wrap);
            updateDrugCount();
            if (!drug) wrap.querySelector('.drug-name-input').focus();
            return id;
        }

        function removeDrugCard(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
            updateDrugCount();
        }

        function toggleTimeChip(id, t, btn) {
            const wrap = document.getElementById(id);
            let times = JSON.parse(wrap.dataset.times || '[]');
            if (times.includes(t)) times = times.filter(x => x !== t); else times.push(t);
            wrap.dataset.times = JSON.stringify(times);
            btn.classList.toggle('active');
        }

        function stepDose(id, delta) {
            const el = document.getElementById(id + '-doseval');
            let v = parseFloat(el.textContent) + delta * 0.5;
            if (v < 0.5) v = 0.5;
            el.textContent = v % 1 === 0 ? v : v.toFixed(1);
        }

        let drugSearchTimers = {};
        async function onDrugNameInput(id, input) {
            const name = input.value.trim();
            const dropdown = document.getElementById(id + '-dropdown');
            document.getElementById(id).dataset.ingredient = '';
            document.getElementById(id + '-verified').className = 'drug-verified pending';
            document.getElementById(id + '-verified').textContent = '';
            if (name.length < 2) { dropdown.style.display = 'none'; return; }
            clearTimeout(drugSearchTimers[id]);
            drugSearchTimers[id] = setTimeout(async () => {
                try {
                    const items = await (await fetch('/search-drug?name=' + encodeURIComponent(name))).json();
                    if (!items.length) { dropdown.style.display = 'none'; return; }
                    dropdown.style.display = 'block';
                    dropdown.innerHTML = items.map(item => `
                        <div class="drug-dropdown-item" onmousedown="selectDrugForCard('${id}', '${esc(item.name)}')">${escapeHtml(item.name)}</div>
                    `).join('') + `<div class="drug-dropdown-item" style="color:var(--slate-400);" onmousedown="dismissDropdown('${id}')"><i class="ti ti-plus" style="font-size:14px;"></i> "${escapeHtml(name)}"를 직접 입력으로 추가</div>`;
                } catch (e) { dropdown.style.display = 'none'; }
            }, 300);
        }
        function dismissDropdown(id) { document.getElementById(id + '-dropdown').style.display = 'none'; }

        async function selectDrugForCard(id, fullName) {
            const wrap = document.getElementById(id);
            const shortName = fullName.replace(/\s*\(.*\)$/, '').trim();
            wrap.querySelector('.drug-name-input').value = shortName;
            document.getElementById(id + '-dropdown').style.display = 'none';
            const verifiedEl = document.getElementById(id + '-verified');
            verifiedEl.className = 'drug-verified pending';
            verifiedEl.textContent = '확인 중...';
            try {
                const items = await (await fetch('/search-drug?name=' + encodeURIComponent(fullName) + '&detail=true')).json();
                const ingredient = items.length ? (items[0].ingredient || '') : '';
                wrap.dataset.ingredient = ingredient;
                verifiedEl.className = 'drug-verified' + (ingredient ? '' : ' pending');
                verifiedEl.innerHTML = ingredient ? `<i class="ti ti-circle-check"></i> 의약품 DB에서 확인됨 · ${escapeHtml(ingredient)}` : '성분 정보 없음';
            } catch (e) { verifiedEl.textContent = ''; }
        }

        async function saveForm() {
            const hospital = document.getElementById('hospital').value.trim();
            const visitDate = document.getElementById('visitDate').value;
            if (!hospital) { toast('병원·약국 이름을 입력해주세요'); goStep1(); return; }
            const cards = Array.from(document.getElementById('drugCardsContainer').children);
            if (cards.length === 0) { toast('약을 1개 이상 추가해주세요'); return; }

            const drugs = cards.map(wrap => {
                const name = wrap.querySelector('.drug-name-input').value.trim();
                const times = JSON.parse(wrap.dataset.times || '[]');
                const dosageNum = document.getElementById(wrap.id + '-doseval').textContent;
                const unit = document.getElementById(wrap.id + '-unit').value;
                const method = document.getElementById(wrap.id + '-method').value;
                let refillDate = '';
                if (formAlarmOn && visitDate && formDays) {
                    const d = new Date(visitDate);
                    d.setDate(d.getDate() + parseInt(formDays));
                    refillDate = d.toISOString().split('T')[0];
                }
                return {
                    drug_name: name,
                    ingredient: wrap.dataset.ingredient || '',
                    dosage: dosageNum + unit,
                    frequency: '하루 ' + (times.length || 1) + '회',
                    times: times.length ? times.join('·') : '아침',
                    meal_timing: method,
                    days: parseInt(formDays) || 0,
                    refill_date: refillDate
                };
            }).filter(d => d.drug_name);

            if (drugs.length === 0) { toast('약 이름을 입력해주세요'); return; }

            const url = editingId ? `/update/${editingId}` : '/add';
            const method = editingId ? 'PUT' : 'POST';
            await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ hospital, visit_date: visitDate, drugs }) });
            window.location.href = '/?page=약장';
        }

        // ══════════════════════════ 검색 ══════════════════════════
        let lastSearchResults = [];
        let selectedSearchIndex = 0;
        let searchDebounceTimer = null;

        function onSearchInput(v) {
            clearTimeout(searchDebounceTimer);
            if (v.trim().length < 2) { document.getElementById('drugSearchResults').innerHTML = ''; document.getElementById('searchResultCount').textContent = ''; return; }
            searchDebounceTimer = setTimeout(() => searchDrugInfo(v), 350);
        }

        async function searchDrugInfo(name) {
            name = (name || document.getElementById('drugSearchInput').value).trim();
            if (!name) return;
            const container = document.getElementById('drugSearchResults');
            container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--slate-400);">검색 중...</div>';
            try {
                const drugs = await (await fetch('/drug-info?name=' + encodeURIComponent(name))).json();
                lastSearchResults = drugs;
                selectedSearchIndex = 0;
                renderSearchResults(drugs);
            } catch (e) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--slate-400);">오류가 발생했어요</div>';
            }
        }

        function cabinetDrugNames() {
            return new Set(prescriptionsData.flatMap(p => p.drugs.map(d => d.drug_name)));
        }

        function renderSearchResults(drugs) {
            const container = document.getElementById('drugSearchResults');
            const countEl = document.getElementById('searchResultCount');
            if (!drugs || !drugs.length) {
                countEl.textContent = '';
                if (drugs) container.innerHTML = `<div class="empty"><i class="ti ti-search" style="font-size:28px;color:var(--slate-300);display:block;margin-bottom:10px;"></i>'${escapeHtml(document.getElementById('drugSearchInput').value)}'에 대한 결과가 없어요</div>`;
                return;
            }
            countEl.textContent = `결과 ${drugs.length}건`;
            const inCabinet = cabinetDrugNames();
            const mobile = isMobile();

            const listHtml = drugs.map((d, i) => `
                <div class="search-result-row ${i === selectedSearchIndex ? 'selected' : ''}" onclick="selectSearchResult(${i})">
                    <div class="tile"><i class="ti ti-pills"></i></div>
                    <div style="flex:1;min-width:0;">
                        <div class="name">${escapeHtml(d.name)}</div>
                        <div class="sub">${escapeHtml(d.ingredient || '성분 정보 없음')}</div>
                    </div>
                    ${inCabinet.has(d.name) ? '<span class="badge-in-cabinet"><i class="ti ti-check"></i> 내 약장에 있음</span>' : ''}
                </div>
            `).join('');

            if (mobile) {
                container.innerHTML = `<div class="search-result-list">${listHtml}</div>` + renderBottomSheetShell();
                openBottomSheetFor(selectedSearchIndex);
            } else {
                container.innerHTML = `
                    <div class="search-grid">
                        <div class="search-result-list">${listHtml}</div>
                        <div class="preview-panel" id="previewPanel">${renderPreview(drugs[selectedSearchIndex])}</div>
                    </div>`;
            }
        }

        function selectSearchResult(i) {
            selectedSearchIndex = i;
            if (isMobile()) { openBottomSheetFor(i); renderSearchResults(lastSearchResults); }
            else renderSearchResults(lastSearchResults);
        }

        function renderPreview(d) {
            if (!d) return '';
            const inCabinet = cabinetDrugNames().has(d.name);
            const counts = buildIngredientCounts();
            const dupNames = d.ingredient && counts[d.ingredient]
                ? prescriptionsData.flatMap(p => p.drugs).filter(x => x.ingredient === d.ingredient).map(x => x.drug_name)
                : [];
            return `
                <div class="preview-head">
                    <div class="tile"><i class="ti ti-pills"></i></div>
                    <div><div class="name">${escapeHtml(d.name)}</div><div class="sub">${escapeHtml(d.ingredient || '성분 정보 없음')}</div></div>
                </div>
                ${d.efficacy ? `<div class="info-section-label">효능·효과</div><div class="info-text" style="margin-bottom:14px;">${escapeHtml(d.efficacy)}</div>` : ''}
                ${d.usage ? `<div class="info-section-label">용법·용량</div><div class="info-text" style="margin-bottom:14px;">${escapeHtml(d.usage)}</div>` : ''}
                <div id="previewMore-${cssSafe(d.name)}" style="display:none;">
                    ${makeDetailSection('주의사항', d.caution)}
                    ${makeDetailSection('부작용', d.side_effect)}
                    ${makeDetailSection('약물 상호작용', d.interaction)}
                    ${makeDetailSection('보관 방법', d.storage)}
                </div>
                ${dupNames.length ? `
                <div class="warn-banner" style="margin-bottom:16px;">
                    <i class="ti ti-alert-triangle" style="color:var(--red-text);font-size:15px;flex-shrink:0;margin-top:1px;"></i>
                    <span class="warn-banner-sub" style="color:var(--red-text);">내 약장의 <b>${escapeHtml([...new Set(dupNames)].join(', '))}</b>과 성분이 중복돼요</span>
                </div>` : ''}
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-secondary" style="flex:1;" onclick="toggleMore('${cssSafe(d.name)}', this)">전체 정보</button>
                    <button class="btn btn-primary" style="flex:1;" onclick="addFromSearch('${esc(d.name)}', '${esc(d.ingredient || '')}')"><i class="ti ti-plus"></i> ${inCabinet ? '약장에 있음' : '약장에 추가'}</button>
                </div>
            `;
        }
        function cssSafe(s) { return String(s).replace(/[^a-zA-Z0-9가-힣]/g, '_'); }
        function toggleMore(key, btn) {
            const el = document.getElementById('previewMore-' + key);
            if (!el) return;
            const show = el.style.display === 'none';
            el.style.display = show ? 'block' : 'none';
            btn.textContent = show ? '간략히 보기' : '전체 정보';
        }

        function renderBottomSheetShell() {
            return `<div class="sheet-dim" id="sheetDim" onclick="closeBottomSheet()"></div><div class="bottom-sheet" id="bottomSheet"><div class="sheet-handle"></div><div id="bottomSheetBody"></div></div>`;
        }
        function openBottomSheetFor(i) {
            const d = lastSearchResults[i];
            if (!d) return;
            setTimeout(() => {
                const dim = document.getElementById('sheetDim');
                const sheet = document.getElementById('bottomSheet');
                if (!dim || !sheet) return;
                document.getElementById('bottomSheetBody').innerHTML = renderPreview(d);
                dim.classList.add('open');
                sheet.classList.add('open');
            }, 0);
        }
        function closeBottomSheet() {
            const dim = document.getElementById('sheetDim');
            const sheet = document.getElementById('bottomSheet');
            if (dim) dim.classList.remove('open');
            if (sheet) sheet.classList.remove('open');
        }

        function addFromSearch(name, ingredient) {
            openForm();
            goStep2();
            const cards = document.getElementById('drugCardsContainer');
            cards.innerHTML = '';
            const id = addDrugCard();
            document.getElementById(id).querySelector('.drug-name-input').value = name;
            document.getElementById(id).dataset.ingredient = ingredient;
            const verifiedEl = document.getElementById(id + '-verified');
            verifiedEl.className = 'drug-verified' + (ingredient ? '' : ' pending');
            verifiedEl.innerHTML = ingredient ? `<i class="ti ti-circle-check"></i> 의약품 DB에서 확인됨 · ${escapeHtml(ingredient)}` : '성분 정보 없음';
            toast('약장에 추가할 처방 정보를 입력해주세요');
        }

        // ── 초기 로드 ──
        navigate(currentPage);
    </script>
</body>
</html>
